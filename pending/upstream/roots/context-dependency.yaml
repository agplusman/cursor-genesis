# L1 根事实：上下文依赖
# 记忆提取的基本机制

id: context-dependency
name: 上下文依赖
principle: "记忆提取的有效性依赖于编码时的上下文线索匹配"

# 来源
source:
  reference: "Tulving & Thomson (1973). Encoding specificity principle"
  type: 认知心理学
  verifiable: true

# 系统边界
system_boundary: 知识检索、信息组织

# 不可动摇性检验
immutability_check:
  can_be_further_decomposed: false
  depends_on_experience: false
  if_invalid_system_collapses: true

# 推论
implications:
  - id: must-record-context
    statement: "索引必须记录'能解决什么问题'，而非只记录内容类型"
    reasoning: "用户检索时的上下文是'我要解决什么问题'，索引必须匹配这个上下文"

  - id: multi-dimension-association
    statement: "需要多维度关联，同一知识可能解决多个问题"
    reasoning: "不同上下文可能激活同一知识"

  - id: problem-oriented-index
    statement: "问题导向的索引比内容导向的索引更有效"
    reasoning: "用户带着问题来，索引应该按问题组织"

# 在本系统中的应用
applications_in_system:
  - "nodes-registry.yaml 中的 keywords 设计"
  - "topics/*.yaml 按问题域组织"
  - "D1 关联维度的存在必要性"

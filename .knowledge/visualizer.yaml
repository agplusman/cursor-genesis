# cursor-genesis 叶子节点可视化配置
# 使用 dimensions 格式，包含三种理解维度
# 完整配置见 stable/packs/knowledge-manage/leaf-node/visualizer/public/config.yaml
# 本文件为叶子节点根目录的配置源，部署时复制到 visualizer/public/config.yaml

engine:
  version: 1.0.0

project:
  name: cursor-genesis
  description: Cursor AI 协作知识叶子节点
  version: v1.2.0

dimensions:
  - id: perspectives
    type: highlight-groups
    name: 使用者视角
    description: 从不同使用者角色理解项目结构
    groups:
      - id: producer
        name: 知识生产者
        description: 向 knowledge-graph 上报精炼内容
        highlight:
          - .knowledge/upstream/exports/
          - stable/knowledge/
        flow_direction: outbound
        color: "#10b981"
      - id: consumer
        name: 知识消费者
        description: 从 knowledge-graph 拉取推荐
        highlight:
          - .knowledge/upstream/sync.yaml
        flow_direction: inbound
        color: "#3b82f6"
      - id: provider
        name: 模板提供者
        description: 向下游项目提供配置
        highlight:
          - stable/atoms/
          - stable/packs/
        flow_direction: outbound
        color: "#8b5cf6"
      - id: receiver
        name: 改进接收者
        description: 接收下游项目回流
        highlight:
          - .knowledge/downstream/
        flow_direction: inbound
        color: "#f59e0b"

  - id: architecture
    type: layer-stack
    name: 认知架构分层
    description: 从四层认知架构理解项目组织
    layers:
      - id: knowledge
        name: 知识层
        paths: [stable/knowledge/]
        description: 可被上层索引的知识内容
        color: "#10b981"
      - id: packs
        name: 套装层
        paths: [stable/packs/]
        description: 原子组合成的功能包
        color: "#8b5cf6"
      - id: atoms
        name: 原子层
        paths: [stable/atoms/]
        description: 最小粒度的可复用单元
        color: "#6366f1"
      - id: meta
        name: 元数据层
        paths: [.knowledge/]
        description: 与知识图谱交互的元数据
        color: "#f59e0b"

  - id: lifecycle
    type: flow-sequence
    name: 知识生命周期
    description: 知识从产生到上报的完整流程
    stages:
      - id: receive
        name: 接收回流
        paths: [.knowledge/downstream/pending/]
        color: "#f59e0b"
      - id: review
        name: 审核精炼
        paths: [.knowledge/downstream/]
        color: "#eab308"
      - id: stable
        name: 稳定发布
        paths: [stable/]
        color: "#10b981"
      - id: export
        name: 上报上游
        paths: [.knowledge/upstream/exports/]
        color: "#3b82f6"

flows:
  - id: upstream-sync
    from: knowledge-graph
    to: .knowledge/upstream/
    type: bidirectional
    label: 上游交互
    color: "#3b82f6"
  - id: config-output
    from: stable/
    to: downstream-projects
    type: outbound
    label: 配置输出
    color: "#8b5cf6"
  - id: backflow-receive
    from: downstream-projects
    to: .knowledge/downstream/
    type: inbound
    label: 回流接收
    color: "#f59e0b"

annotations:
  .knowledge/:
    label: 知识管理中枢
    icon: brain
    description: 与知识图谱交互的元数据
    color: "#6366f1"
  .knowledge/upstream/:
    label: 上游交互
    icon: arrow-up
  .knowledge/upstream/sync.yaml:
    label: 同步配置
    icon: refresh-cw
  .knowledge/upstream/exports/:
    label: 待上报内容
    icon: upload
  .knowledge/downstream/:
    label: 下游交互
    icon: arrow-down
  .knowledge/downstream/backflow.yaml:
    label: 回流配置
    icon: git-pull-request
  .knowledge/downstream/pending/:
    label: 待处理回流
    icon: inbox
  stable/:
    label: 对外稳定内容
    icon: package
    color: "#10b981"
  stable/atoms/:
    label: 原子层
    icon: atom
  stable/atoms/rules/:
    label: Cursor Rules
    icon: file-code
  stable/atoms/capabilities/:
    label: 能力层
    icon: layers
  stable/packs/:
    label: 包层
    icon: package-2
  stable/knowledge/:
    label: 知识层
    icon: book-open
  workspace/:
    label: 本地工作区
    icon: folder-open
    color: "#94a3b8"
  docs/:
    label: 文档
    icon: file-text
  README.md:
    label: 项目介绍
    icon: info

  - id: java-backend-test-ops
    title: Java 后端测试运维方法论 Skill
    source: .knowledge/upstream/exports/capability-changes/2026-04-18-java-backend-test-ops.md
    type: capability_change
    content_status: stable
    knowledge_type: methodology
    validation_level: 3
    problem_domain: |
      Java + Spring Boot 3.x + Testcontainers 项目中两类高频痛点：
      - Testcontainers 留守容器累积导致 InnoDB EAGAIN（AIO 槽位耗尽）
      - Spring Boot 3.x MockMvc API @NonNull 注解告警扩散
      附带共享测试基类变更传播规则。
    solution_summary: |
      新增 stable/atoms/skills/java-backend-test-ops/SKILL.md（方法论型 SKILL.md，约 159 行）：
      - §一 Spring Boot 3.x Null-Safety 规范（APPLICATION_JSON_VALUE / @SuppressWarnings("null")）
      - §二 Testcontainers 资源治理（PowerShell Clear 函数 + Bash 等价 + 替代方案对比）
      - §三 共享测试基类变更传播（grep + 全量传播 + 生成器同步）
      - §四 故障案例（EAGAIN 实战 + Null-Safety 扩散）
      - §五 来源回链（指向 secmgr-test-ops + 派生原则）
    applicable_scenario: 任何 Java 17+ / Maven / Spring Boot 3.2 ~ 3.x / Testcontainers / Docker Desktop 项目
    related_artifacts:

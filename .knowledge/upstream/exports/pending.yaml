# 上报类型说明：
# - capability_change: 新增或变更的能力（必须）
# - refined_knowledge: 从实践中整理的通用解决方案（可选）
# - solution_feedback: 对方案边界/局限性的新发现（可选）

items:
  # ============================================================
  # 一、方法论类（跨工具适用）
  # ============================================================

  - id: four-layer-cognition
    title: 四层认知能力模型
    source: stable/atoms/capabilities/
    type: capability_change
    content_status: stable
    knowledge_type: methodology
    validation_level: 4
    problem_domain: AI 协作中如何组织和分类能力
    solution_summary: |
      将能力按认知层次分为四层：
      - 01_insight: 洞察分析（需求理解、市场分析）
      - 02_architecture: 架构设计（系统设计、技术评估）
      - 03_engineering: 工程实现（编码、工程化）
      - 04_quality: 质量保障（审计、验收）
    applicable_scenario: 任何需要组织 AI 角色能力的场景，不限于 Cursor

  - id: cognitive-model-3plus2
    title: 3+2 认知架构
    source: stable/knowledge/knowledge-system/01-结构化认知模型.md
    type: refined_knowledge
    content_status: stable
    knowledge_type: fundamental
    validation_level: 4
    problem_domain: 如何构建可持续演进的知识管理体系
    solution_summary: |
      基于认知科学的知识组织模型：
      - 三层：L1 根节点（第一性原理）→ L2 索引层（组块）→ L3 数据层（细节）
      - 两维：D1 关联维度（跨域连接）+ D2 元认知维度（监控调节）
      理论支撑：Chi 专家-新手研究、Chase & Simon 组块理论、Sweller 认知负荷理论
    applicable_scenario: 知识管理系统设计、学习体系构建、AI 辅助认知

  - id: knowledge-organization
    title: 知识组织方法论
    source: stable/knowledge/knowledge-system/02-知识组织方法论.md
    type: refined_knowledge
    content_status: stable
    knowledge_type: methodology
    validation_level: 3
    problem_domain: 如何系统化地组织和分类知识内容
    solution_summary: |
      知识组织的核心原则：
      - 按稳定性分类（fundamental/methodology/application/tool_specific）
      - 建立可检索的索引结构
      - 区分"找知识的路径"和"知识本身"
    applicable_scenario: 知识库建设、文档体系设计、团队知识管理

  - id: distributed-knowledge-arch
    title: 分布式知识管理架构
    source: stable/knowledge/knowledge-system/05-分布式知识管理架构.md
    type: refined_knowledge
    content_status: stable
    knowledge_type: methodology
    validation_level: 3
    problem_domain: 多项目、多团队场景下的知识协同
    solution_summary: |
      分布式知识管理的核心设计：
      - 上层（认知层）：定义规范、处理关联、提供索引
      - 叶子节点（模板层）：生产内容、接收回流、暴露接口
      - 下游项目（执行层）：使用资产、产生经验、提交回流
    applicable_scenario: 多项目知识共享、组织级知识管理

  - id: leaf-node-framework
    title: 叶子节点治理框架
    source: stable/knowledge/knowledge-system/06-叶子节点治理框架.md
    type: refined_knowledge
    content_status: stable
    knowledge_type: methodology
    validation_level: 3
    problem_domain: 知识图谱中叶子节点的规范化治理
    solution_summary: |
      叶子节点治理的核心机制：
      - 注册协议：节点接入时协商上报/接收内容
      - 回流机制：下游经验 → 叶子节点 → 上层
      - 同步状态：synced/outdated/local_only/diverged
    applicable_scenario: 知识图谱设计、多仓库协同管理

  # ============================================================
  # 二、团队编排模式（抽象后可跨工具）
  # ============================================================

  - id: signal-pattern-role-matrix
    title: 信号-模式-角色决策矩阵
    source: stable/atoms/patterns/
    type: capability_change
    content_status: stable
    knowledge_type: methodology
    validation_level: 3
    problem_domain: 如何根据用户意图自动分派合适的 AI 角色
    solution_summary: |
      意图识别和角色分派的通用方法：
      - Signal（信号）：从用户输入提取关键词/动词
      - Pattern（模式）：将信号映射到抽象类别
      - Role（角色）：根据模式激活对应能力
      示例：["lagging", "click"] → Performance Issue → Code Maintainer
    applicable_scenario: 多角色 AI 系统、智能助手设计

  - id: team-orchestration-pattern
    title: 虚拟团队编排模式
    source: stable/atoms/patterns/
    type: capability_change
    content_status: stable
    knowledge_type: methodology
    validation_level: 3
    problem_domain: 如何组织多个 AI 角色协作完成复杂任务
    solution_summary: |
      虚拟团队编排的核心思想：
      - Orchestrator 不直接回答，而是分派到专业角色
      - 定义标准工作流（Agile/Rigorous/Fix/Release）
      - 角色间通过文档和状态传递上下文
    applicable_scenario: 复杂任务分解、多 Agent 协作系统

  # ============================================================
  # 三、实践经验（通用解决方案）
  # ============================================================

  - id: ppt-case-extraction
    title: PPT 案例提取技巧
    source: stable/knowledge/learnings/2026-02-25-ppt-case-extraction-technique.md
    type: refined_knowledge
    content_status: stable
    knowledge_type: application
    validation_level: 2
    problem_domain: 如何从散乱的项目经验中提取有代表性的案例
    solution_summary: |
      案例提取的核心方法：
      1. 追问细节亮点：与用户深入讨论
      2. 主动搜索项目：从代码中发现遗漏亮点
      3. 分类归纳：每类选一个典型
      4. 灵活总结：根据复杂度选择总结粒度
      本质：从散点到结构
    applicable_scenario: 汇报材料准备、经验总结、知识沉淀

  - id: spec-driven-development
    title: 规范驱动开发分析
    source: stable/knowledge/learnings/2025-12-01-spec-driven-development-analysis.md
    type: refined_knowledge
    content_status: stable
    knowledge_type: methodology
    validation_level: 2
    problem_domain: 如何在 AI 辅助开发中保证代码质量
    solution_summary: |
      规范先行的开发方法：
      - 先定义规范（接口、约束、验收标准）
      - 再让 AI 按规范生成代码
      - 规范作为验证基准
    applicable_scenario: AI 辅助编程、代码生成、质量保障

  - id: architecture-pattern-separation
    title: 架构模式分离
    source: stable/knowledge/learnings/2025-12-01-architecture-pattern-separation.md
    type: refined_knowledge
    content_status: stable
    knowledge_type: methodology
    validation_level: 2
    problem_domain: 如何设计可复用的架构
    solution_summary: |
      架构与实现分离的原则：
      - 架构（Pattern）：抽象的结构和约束
      - 实现（Implementation）：具体的代码和配置
      - 分离后架构可跨项目复用
    applicable_scenario: 架构设计、模板库建设

  # ============================================================
  # 四、提示词方法论（抽象后可跨工具）
  # ============================================================

  - id: prompt-writing-methodology
    title: 提示词编写方法论
    source: stable/knowledge/cursor-specs/prompt-writing-guide.md
    type: capability_change
    content_status: stable
    knowledge_type: methodology
    validation_level: 4
    problem_domain: 如何编写高质量、结构化的 AI 提示词
    solution_summary: |
      提示词编写的核心方法：
      - 角色化：定义清晰的角色身份和职责
      - 目标导向：明确任务目标和成功标准
      - 模板化：使用可复用的结构模板
      - 约束明确：定义边界和禁止行为
    applicable_scenario: 任何 AI 工具的提示词设计，不限于 Cursor

  # ============================================================
  # 五、目录结构洞察（从实践中回流）
  # ============================================================

  - id: directory-restructuring-insight
    title: 目录结构重组洞察——先打通再收缩
    source: .knowledge/upstream/exports/refined-knowledge/2026-02-28-directory-restructuring-insight.md
    type: refined_knowledge
    content_status: stable
    knowledge_type: methodology
    validation_level: 2
    problem_domain: 如何在叶子节点中平衡流程完整性与用户认知友好
    solution_summary: |
      目录结构设计的两阶段方法：
      - 阶段一：在现有结构上先打通上下游完整流程
      - 阶段二：按使用场景维度重组，把相关内容归拢到一起
      背后认知：先运行才知道什么相关，减少同级目录降低认知负荷
    applicable_scenario: 知识管理系统目录设计、信息架构优化、叶子节点结构调整


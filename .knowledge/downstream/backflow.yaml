# downstream/backflow.yaml
# 与下游项目的回流配置和记录

# 回流来源项目
sources: []
  # 示例:
  # - project: anfu_test
  #   project_hash: a1b2c3d4
  #   last_backflow: 2026-02-26
  #   status: active
  #   description: "安服系统，使用 cursor-genesis 的 Cursor 协作配置"

# 待审核的回流
pending_reviews: []
  # 示例:
  # - id: bf-001
  #   from: anfu_test
  #   contributor: user123
  #   commit: e5f6g7h8
  #   submitted_at: 2026-02-26T15:30:00Z
  #   status: pending
  #   type: capability-change
  #   title: "对话状态机改进"
  #   description: "优化了对话状态机的错误处理逻辑"

# 处理中的回流
processing: []
  # 示例:
  # - id: bf-002
  #   from: anfu_test
  #   status: refining
  #   started_at: 2026-02-27T09:00:00Z
  #   target_export: capability-changes/dialog-state-machine.md
  #   notes: "需要补充测试用例"

# 已完成的回流（最近 10 条）
completed: []
  # 示例:
  # - id: bf-003
  #   from: anfu_test
  #   completed_at: 2026-02-25T16:00:00Z
  #   result: accepted
  #   exported_to: .knowledge/upstream/exports/capability-changes/xxx.md
  #   notes: "已精炼并准备上报"

# 回流审核标准
review_criteria:
  - 内容质量：是否解决真实问题
  - 可复用性：是否适用于其他项目
  - 格式规范：是否符合模板
  - 测试验证：是否有验证结果

# 回流处理 SLA
sla:
  initial_review: 2  # 初审时间（工作日）
  refinement: 5      # 精炼时间（工作日）
  total: 7           # 总处理时间（工作日）
